{% extends "base.html" %}
{% block title %}دەستکاری پرۆفایل{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card shadow"><div class="card-body">
<h3 class="text-center mb-3">دەستکاری پرۆفایل</h3>
<form method="POST">
    <div class="mb-3"><input name="username" class="form-control" value="{{ user.username }}" required></div>
    <div class="mb-3"><input type="email" name="email" class="form-control" value="{{ user.email }}" required></div>
    <button type="submit" class="btn btn-primary w-100">نوێکردنەوە</button>
</form>
</div></div></div></div>
{% endblock %}

<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}بازاڕی سەیارە و پارچە{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; min-height: 100vh; display: flex; flex-direction: column; }
        .content { flex: 1; }
        footer { background: #212529; color: white; padding: 15px 0; margin-top: auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🚗 بازاڕی سەیارە</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">سەرەکی</a></li>
                    <li class="nav-item"><a class="nav-link" href="/add_vehicle">زیادکردنی ئۆتۆمبێل</a></li>
                    <li class="nav-item"><a class="nav-link" href="/add_part">زیادکردنی پارچە</a></li>
                    <li class="nav-item"><a class="nav-link" href="/dashboard">داشبۆرد</a></li>
                    {% if current_user.is_authenticated %}
                    <li class="nav-item"><a class="nav-link" href="/logout">چوونەدەرەوە</a></li>
                    {% else %}
                    <li class="nav-item"><a class="nav-link" href="/login">چوونەژوورەوە</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register">خۆتۆمارکردن</a></li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="content container mt-4">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <div class="container text-center">
            © ٢٠٢٥ بازاڕی سەیارە و پارچە - عێراق
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}کورد ئۆتۆ - بازاڕی سەیارە و پارچە{% endblock %}</title>
    <!-- فۆنتی عەرەبی -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;600;800;900&display=swap" rel="stylesheet">
    <!-- CSS ی تایبەتی -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- ناوبار -->
    <nav class="ka-navbar">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="/" class="ka-brand">
                <span class="brand-icon">🚗</span>
                <span class="brand-text">کورد ئۆتۆ</span>
            </a>
            <div>
                <a href="/" class="nav-link">سەرەکی</a>
                <a href="/add_vehicle" class="nav-link ka-add-btn">+ زیادکردن</a>
                {% if current_user.is_authenticated %}
                <a href="/dashboard" class="nav-link">داشبۆرد</a>
                <a href="/logout" class="nav-link">چوونەدەرەوە</a>
                {% else %}
                <a href="/login" class="nav-link">چوونەژوورەوە</a>
                <a href="/register" class="nav-link ka-register-btn">خۆتۆمارکردن</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- ناوەڕۆک -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- فوتەر -->
    <footer class="ka-footer">
        <div class="container">
            <p>© 2025 کورد ئۆتۆ - هەموو مافێک پارێزراوە</p>
        </div>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>
</html>

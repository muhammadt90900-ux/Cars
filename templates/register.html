{% extends "base.html" %}
{% block title %}خۆتۆمارکردن{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-4"><div class="card shadow"><div class="card-body">
<h3 class="text-center mb-3">خۆتۆمارکردن</h3>
<form method="POST">
    <div class="mb-3"><input name="username" class="form-control" placeholder="ناوی بەکارهێنەر" required></div>
    <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="ئیمەیڵ" required></div>
    <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="پاسۆرد" required></div>
    <button type="submit" class="btn btn-success w-100">خۆتۆمارکردن</button>
</form>
</div></div></div></div>
{% endblock %}

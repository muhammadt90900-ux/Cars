{% extends "base.html" %}
{% block title %}دەستکاری ئۆتۆمبێل{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card shadow"><div class="card-body">
<h3 class="text-center mb-3">دەستکاری ئۆتۆمبێل</h3>
<form method="POST">
    <div class="mb-3"><input name="brand" class="form-control" value="{{ vehicle.brand }}" required></div>
    <div class="mb-3"><input name="model" class="form-control" value="{{ vehicle.model }}" required></div>
    <div class="mb-3"><input type="number" name="year" class="form-control" value="{{ vehicle.year }}" required></div>
    <div class="mb-3"><input type="number" step="0.01" name="price" class="form-control" value="{{ vehicle.price }}" required></div>
    <div class="mb-3"><textarea name="description" class="form-control" rows="3">{{ vehicle.description }}</textarea></div>
    <button type="submit" class="btn btn-success w-100">نوێکردنەوە</button>
</form>
</div></div></div></div>
{% endblock %}

{% extends "base.html" %}
{% block title %}چات{% endblock %}
{% block content %}
<h3>چاتی ڕاستەوخۆ</h3>
<div class="card"><div class="card-body" id="chat-box" style="height:300px;overflow-y:scroll;">
    {% for msg in messages %}
        <p><strong>{{ msg.sender }}:</strong> {{ msg.text }}</p>
    {% endfor %}
</div></div>
<form method="POST" class="mt-2"><input name="message" class="form-control" placeholder="پەیام..."><button class="btn btn-primary mt-2">ناردن</button></form>
{% endblock %}

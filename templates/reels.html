{% extends "base.html" %}
{% block title %}ڕیلەکان{% endblock %}
{% block content %}
<h2>ڕیلەکان</h2>
<div class="row">
    {% for reel in reels %}
    <div class="col-md-4 mb-4">
        <div class="card"><div class="card-body"><video controls class="w-100"><source src="{{ reel.url }}" type="video/mp4"></video><p>{{ reel.caption }}</p></div></div>
    </div>
    {% endfor %}
</div>
{% endblock %}

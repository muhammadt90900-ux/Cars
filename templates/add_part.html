{% extends "base.html" %}
{% block title %}زیادکردنی پارچە{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card shadow"><div class="card-body">
<h3 class="text-center mb-3">زیادکردنی پارچە</h3>
<form method="POST">
    <div class="mb-3"><input name="name" class="form-control" placeholder="ناوی پارچە" required></div>
    <div class="mb-3"><input type="number" step="0.01" name="price" class="form-control" placeholder="نرخ" required></div>
    <div class="mb-3"><textarea name="description" class="form-control" rows="3" placeholder="وەسف"></textarea></div>
    <button type="submit" class="btn btn-primary w-100">تۆمارکردن</button>
</form>
</div></div></div></div>
{% endblock %}

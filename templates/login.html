{% extends "base.html" %}
{% block title %}چوونەژوورەوە{% endblock %}
{% block content %}
<div class="ka-form-card">
    <h2 class="ka-form-title">چوونەژوورەوە</h2>
    <form method="POST">
        <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="ئیمەیڵ" required></div>
        <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="پاسۆرد" required></div>
        <button type="submit" class="btn-ka-primary w-100">چوونەژوورەوە</button>
    </form>
    <p class="mt-3 text-center" style="color: var(--text-muted);"><a href="/register" style="color: var(--gold);">خۆتۆمارکردن</a></p>
</div>
{% endblock %}

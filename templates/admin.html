{% extends "base.html" %}
{% block title %}داشبۆرد{% endblock %}
{% block content %}
<h2>داشبۆردی بەڕێوەبەر</h2>
<div class="row">
    <div class="col-md-3 mb-3"><div class="card text-white bg-primary"><div class="card-body"><h5>ئۆتۆمبێلەکان</h5><h3>{{ vehicle_count }}</h3></div></div></div>
    <div class="col-md-3 mb-3"><div class="card text-white bg-success"><div class="card-body"><h5>پارچەکان</h5><h3>{{ part_count }}</h3></div></div></div>
    <div class="col-md-3 mb-3"><div class="card text-white bg-warning"><div class="card-body"><h5>بەکارهێنەران</h5><h3>{{ user_count }}</h3></div></div></div>
    <div class="col-md-3 mb-3"><div class="card text-white bg-info"><div class="card-body"><h5>داھات</h5><h3>${{ revenue }}</h3></div></div></div>
</div>
{% endblock %}
